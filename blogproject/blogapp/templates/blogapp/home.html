{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">Latest Posts</h2>

<div class="row">

{% for post in posts %}

<div class="col-md-4 mb-4">

    <div class="card h-100 shadow-sm">

        {% if post.image %}
        <img src="{{ post.image.url }}" class="card-img-top" height="220" style="object-fit: cover;">
        {% endif %}

        <div class="card-body d-flex flex-column">

            <h5 class="card-title">{{ post.title }}</h5>

            <p class="card-text">
                {{ post.content|truncatewords:20 }}
            </p>

            <a href="{% url 'post_details' post.id %}" class="btn btn-primary mt-auto">
                Read More
            </a>

        </div>

    </div>

</div>

{% empty %}

<div class="col-12">
    <div class="alert alert-info text-center">
        No posts available.
    </div>
</div>

{% endfor %}

</div>

{% endblock %}
